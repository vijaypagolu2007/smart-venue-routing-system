<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>svos-ui</title>
  </head>
  <body>
    <div id="root">
      <div style="background: #020617; height: 100vh; display: flex; align-items: center; justify-content: center; color: #3b82f6; font-family: sans-serif; font-weight: 900; letter-spacing: 0.2em;">
        INITIALIZING TACTICAL INTERFACE...
      </div>
    </div>
    <script>
      window.onerror = function(msg, url, line, col, error) {
        var div = document.createElement('div');
        div.style.color = 'red';
        div.style.position = 'fixed';
        div.style.top = '0';
        div.style.background = 'white';
        div.style.zIndex = '9999';
        div.innerHTML = 'FATAL ERROR: ' + msg + ' at ' + url + ':' + line;
        document.body.appendChild(div);
      };
      window.addEventListener('error', function(e) {
        if (e.target.tagName === 'SCRIPT') {
          console.error('SCRIPT LOAD FAILURE:', e.target.src);
        }
      }, true);
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
